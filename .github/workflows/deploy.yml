name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - master

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Firebase credentials
        run: |
          echo '${{ secrets.TELEIOS_SITE }}' > "${{ runner.temp }}/firebase-key.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=${{ runner.temp }}/firebase-key.json" >> $GITHUB_ENV

      - name: Deploy Firestore rules
        run: npx firebase-tools@latest deploy --only firestore:rules --project teleios-7bf72 --non-interactive

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.TELEIOS_SITE }}'
          channelId: live
          projectId: teleios-7bf72
