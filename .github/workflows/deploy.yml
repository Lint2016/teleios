name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - master

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@11.35.0

      - name: Deploy to Firebase Hosting
        run: firebase deploy --only hosting --project teleios-7bf72 --non-interactive --debug
        env:
          FIREBASE_TOKEN: ${{ secrets.TELEIOS_SITE }}
