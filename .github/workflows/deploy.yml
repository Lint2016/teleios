name: Deploy to Firebase

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Firebase service account
        run: |
          echo '${{ secrets.TELEIOS_SITE }}' > "${{ runner.temp }}/firebase-key.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=${{ runner.temp }}/firebase-key.json" >> $GITHUB_ENV
          echo "Deploying as: $(node -e "console.log(require('${{ runner.temp }}/firebase-key.json').client_email)")"

      - name: Deploy to Firebase (Hosting + Firestore rules)
        run: npx firebase-tools@latest deploy --only hosting,firestore:rules --project teleios-7bf72 --non-interactive
